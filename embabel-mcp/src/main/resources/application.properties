spring.application.name=embabel-mcp
server.port=9090
spring.profiles.active=local

# Embabel configuration
embabel.llm.provider=groq
embabel.models.default-llm=llama-3.1-8b-instant
groq.api.key=${GROQ_API_KEY:}

# Map embabel provider to Spring AI chat model (openai for groq)
spring.ai.model.chat=openai

# Spring AI OpenAI/Groq properties
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY:placeholder-key-for-startup}
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# Spring AI Ollama properties
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3

# Allow overriding auto-configured beans
spring.main.allow-bean-definition-overriding=true

# Search MCP configuration
embabel.search.provider=auto
embabel.search.max-results=5
embabel.search.tavily.api-key=${TAVILY_API_KEY:}
embabel.search.brave.api-key=${BRAVE_API_KEY:}